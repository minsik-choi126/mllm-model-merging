# C3 — Vanilla (no QK-norm) · Stage 2 · 3B
#
# Continues from vanilla_align (Stage 1) and runs full instruction tuning on
# LLaVA-1.5 mix665k. Output is the "vanilla VLM" against which we measure
# the QK-norm-injected variant.
defaults:
  - ../_base_/model_qwen25_3b_init.yaml

data:
  name: jsonl
  root: training/configs/data/stage2_llava_mix665k.json
  split: train
  max_length: 4096

model:
  pretrained: ckpts/c3/3b/vanilla_align
  tune_mm_mlp_adapter: false
  freeze_llm: false
  freeze_projector: false
  inject_qknorm: false
  max_pixels: 451584                    # 672×672 (lighter than 7B recipe to fit 2 GPUs)
  attn_implementation: sdpa

train:
  output_dir: ckpts/c3/3b/vanilla_stage2
  seed: 42
  optim: adamw_torch
  learning_rate: 2.0e-5
  weight_decay: 0.0
  max_grad_norm: 1.0
  warmup_ratio: 0.03
  lr_scheduler_type: cosine
  per_device_train_batch_size: 4
  gradient_accumulation_steps: 16       # eff batch = 4 * 2 * 16 = 128
  num_train_epochs: 1.0
  max_steps: -1
  ddp_timeout: 7200
  bf16: true
  fp16: false
  logging_steps: 10
  save_strategy: epoch
  save_total_limit: 1
  dataloader_num_workers: 2
  gradient_checkpointing: true
  report_to: none
  run_name: c3-3b-vanilla-stage2
  group_by_modality_length: true
  deepspeed: training/train/deepspeed_configs/zero2.json

merit:
  r: 0
