# Composed-init backbone (Qwen2.5-VL-3B vision + Qwen2.5-3B-Instruct LM + fresh projector).
# Built by: python -m training.scripts.build_init_from_pretrained \
#               --vl-ckpt /131_data/geeho/minsik/Qwen2.5-VL-3B-Instruct \
#               --lm-ckpt /131_data/geeho/minsik/Qwen2.5-3B-Instruct \
#               --output ckpts/c3/init/qwen25vl_3b_text_lm
model:
  pretrained: ckpts/c3/init/qwen25vl_3b_text_lm
  dtype: bfloat16
  trust_remote_code: true
  attn_implementation: sdpa     # A6000-safe; switch to flash_attention_2 if installed
